<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お知らせを受け取りますか？</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: linear-gradient(135deg, #fff0f3 0%, #ffe4e8 50%, #ffd6f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 36px 40px;
      max-width: 400px;
      width: 92%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.12);
    }

    .panda-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 260px;
      margin-bottom: 4px;
    }
    #panda-canvas { display: block; }

    .hearts {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 10;
    }
    .heart {
      position: absolute;
      font-size: 22px;
      opacity: 0;
      animation: floatHeart 1.1s ease-out forwards;
    }
    @keyframes floatHeart {
      0%   { opacity: 1; transform: translateY(0) scale(0.5); }
      100% { opacity: 0; transform: translateY(-90px) scale(1.3); }
    }

    .title { font-size: 19px; font-weight: bold; color: #222; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #999; line-height: 1.7; margin-bottom: 22px; }

    .benefits { background: #fff5f7; border-radius: 14px; padding: 14px 16px; margin-bottom: 24px; text-align: left; }
    .benefit-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #555; padding: 4px 0; }
    .benefit-icon { font-size: 17px; flex-shrink: 0; }

    .btn-allow {
      display: block; width: 100%; padding: 15px;
      background: linear-gradient(135deg, #ff5c8d, #ff3a6e);
      color: white; border: none; border-radius: 50px;
      font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 12px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 22px rgba(255,60,110,0.38);
    }
    .btn-allow:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,60,110,0.48); }
    .btn-allow:active { transform: translateY(0); }

    .btn-deny {
      display: block; width: 100%; padding: 11px;
      background: transparent; color: #bbb; border: none;
      font-size: 13px; cursor: pointer; transition: color 0.2s;
    }
    .btn-deny:hover { color: #999; }

    .message {
      margin-top: 14px; font-size: 13px; color: #ff3a6e;
      min-height: 18px; font-weight: bold;
      opacity: 0; transition: opacity 0.3s;
    }
    .message.show { opacity: 1; }

    .success-screen { display: none; }
    .success-screen.show { display: block; }
    .main-content.hide { display: none; }

    .success-bear-wrap { height: 260px; display: flex; justify-content: center; align-items: center; }
    #success-canvas { display: block; }
    .success-title { font-size: 22px; font-weight: bold; color: #ff3a6e; margin: 12px 0 8px; }
    .success-sub { font-size: 14px; color: #888; line-height: 1.7; }
  </style>
</head>
<body>

<div class="card">
  <div class="main-content" id="mainContent">
    <div class="panda-wrap">
      <div class="hearts" id="hearts"></div>
      <canvas id="panda-canvas"></canvas>
    </div>
    <h1 class="title">パンダからお願いがあります🐼</h1>
    <p class="subtitle">プッシュ通知を許可してもらえると<br>とってもうれしいです…！</p>
    <div class="benefits">
      <div class="benefit-item"><span class="benefit-icon">🔔</span><span>最新のお知らせをすぐにお届け</span></div>
      <div class="benefit-item"><span class="benefit-icon">🎁</span><span>限定セール・キャンペーンの先行案内</span></div>
      <div class="benefit-item"><span class="benefit-icon">🚫</span><span>いつでも簡単に解除できます</span></div>
    </div>
    <button class="btn-allow" id="btnAllow"
      onmouseenter="setPandaState('dance')"
      onmouseleave="setPandaState('idle')"
      onclick="onAllow()">🐼 許可する（パンダが喜びます）</button>
    <button class="btn-deny" id="btnDeny"
      onmouseenter="setPandaState('sad')"
      onmouseleave="setPandaState('comeback')"
      onclick="onDeny()">今は使わない</button>
    <div class="message" id="message"></div>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-bear-wrap"><canvas id="success-canvas"></canvas></div>
    <div class="success-title">ありがとう！！！🎉</div>
    <p class="success-sub">パンダは今とってもしあわせです🛍️<br>大切なお知らせをお届けしますね♪</p>
  </div>
</div>

<script>
// ============================================================
//  シーン作成
// ============================================================
function createScene(canvasEl, size) {
  const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(size, size);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
  camera.position.set(0, 0.5, 8.5);
  camera.lookAt(0, 0.0, 0);

  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
  dirLight.position.set(3, 5, 5);
  scene.add(dirLight);

  const fillLight = new THREE.DirectionalLight(0xfff0f5, 0.4);
  fillLight.position.set(-4, 2, 3);
  scene.add(fillLight);

  const backLight = new THREE.DirectionalLight(0xffe8f0, 0.2);
  backLight.position.set(0, -2, -4);
  scene.add(backLight);

  return { renderer, scene, camera };
}

// ============================================================
//  パンダ構築
// ============================================================
function buildPanda(scene) {
  const white   = new THREE.MeshPhongMaterial({ color: 0xf2f2f2, shininess: 50 });
  const black   = new THREE.MeshPhongMaterial({ color: 0x181818, shininess: 30 });
  const pink    = new THREE.MeshPhongMaterial({ color: 0xffaabb, shininess: 10, transparent: true, opacity: 0.7 });
  const red     = new THREE.MeshPhongMaterial({ color: 0xe8273a, shininess: 40 });
  const darkRed = new THREE.MeshPhongMaterial({ color: 0xb51c2c, shininess: 20 });
  const eyeW    = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 90 });

  const root = new THREE.Group();

  // ── ボディ ──
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.72, 32, 32), white);
  body.position.set(0, -0.52, 0);
  body.scale.set(1, 1.08, 0.88);
  root.add(body);

  // ── 頭（首ピボット） ──
  const headG = new THREE.Group();
  headG.position.set(0, 0.62, 0);
  root.add(headG);

  headG.add(new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), white));

  [-0.42, 0.42].forEach(x => {
    const ear = new THREE.Mesh(new THREE.SphereGeometry(0.19, 16, 16), black);
    ear.position.set(x, 0.47, 0.06);
    headG.add(ear);
  });

  [-0.22, 0.22].forEach(x => {
    const patch = new THREE.Mesh(new THREE.SphereGeometry(0.21, 24, 24), black);
    patch.scale.set(1, 0.82, 0.45);
    patch.position.set(x, 0.08, 0.53);
    headG.add(patch);

    const ew = new THREE.Mesh(new THREE.SphereGeometry(0.1, 20, 20), eyeW);
    ew.position.set(x, 0.11, 0.67);
    headG.add(ew);

    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.062, 16, 16), black);
    pupil.position.set(x, 0.11, 0.74);
    headG.add(pupil);

    const hl = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), eyeW);
    hl.position.set(x + 0.035, 0.14, 0.77);
    headG.add(hl);

    const cheek = new THREE.Mesh(new THREE.SphereGeometry(0.13, 16, 16), pink);
    cheek.scale.set(1.1, 0.5, 0.4);
    cheek.position.set(x * 1.55, -0.03, 0.56);
    headG.add(cheek);
  });

  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.068, 16, 16), black);
  nose.scale.set(1.3, 0.75, 0.55);
  nose.position.set(0, -0.08, 0.59);
  headG.add(nose);

  // ── 左腕（肩ピボット） ──
  const lArmG = new THREE.Group();
  lArmG.position.set(-0.66, -0.25, 0);
  root.add(lArmG);
  const lArmMesh = new THREE.Mesh(new THREE.SphereGeometry(0.24, 20, 20), white);
  lArmMesh.scale.set(0.72, 1.3, 0.72);
  lArmMesh.position.set(-0.08, -0.32, 0.08);
  lArmG.add(lArmMesh);
  const lHand = new THREE.Mesh(new THREE.SphereGeometry(0.14, 16, 16), black);
  lHand.position.set(-0.1, -0.65, 0.08);
  lArmG.add(lHand);

  // ── 右腕（肩ピボット）＋バッグ ──
  const rArmG = new THREE.Group();
  rArmG.position.set(0.66, -0.25, 0);
  root.add(rArmG);
  const rArmMesh = new THREE.Mesh(new THREE.SphereGeometry(0.24, 20, 20), white);
  rArmMesh.scale.set(0.72, 1.3, 0.72);
  rArmMesh.position.set(0.08, -0.32, 0.08);
  rArmG.add(rArmMesh);
  const rHand = new THREE.Mesh(new THREE.SphereGeometry(0.14, 16, 16), black);
  rHand.position.set(0.1, -0.65, 0.08);
  rArmG.add(rHand);

  const bagG = new THREE.Group();
  bagG.position.set(0.3, -0.6, 0.35);
  bagG.rotation.z = -0.18;
  rArmG.add(bagG);
  const bagBody = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.42, 0.24), red);
  bagG.add(bagBody);
  const bagTop = new THREE.Mesh(new THREE.BoxGeometry(0.36, 0.06, 0.24), darkRed);
  bagTop.position.y = 0.24;
  bagG.add(bagTop);
  const handle = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.022, 8, 20, Math.PI), darkRed);
  handle.position.set(0, 0.27, 0);
  handle.rotation.x = Math.PI;
  bagG.add(handle);

  // ── 左足（股ピボット） ──
  const lLegG = new THREE.Group();
  lLegG.position.set(-0.37, -0.9, 0);
  root.add(lLegG);
  const lLegMesh = new THREE.Mesh(new THREE.SphereGeometry(0.24, 20, 20), white);
  lLegMesh.scale.set(0.82, 1.05, 0.9);
  lLegMesh.position.set(0, -0.26, 0);
  lLegG.add(lLegMesh);
  const lFoot = new THREE.Mesh(new THREE.SphereGeometry(0.19, 16, 16), black);
  lFoot.scale.set(1.05, 0.62, 1.25);
  lFoot.position.set(0, -0.54, 0.1);
  lLegG.add(lFoot);

  // ── 右足（股ピボット） ──
  const rLegG = new THREE.Group();
  rLegG.position.set(0.37, -0.9, 0);
  root.add(rLegG);
  const rLegMesh = new THREE.Mesh(new THREE.SphereGeometry(0.24, 20, 20), white);
  rLegMesh.scale.set(0.82, 1.05, 0.9);
  rLegMesh.position.set(0, -0.26, 0);
  rLegG.add(rLegMesh);
  const rFoot = new THREE.Mesh(new THREE.SphereGeometry(0.19, 16, 16), black);
  rFoot.scale.set(1.05, 0.62, 1.25);
  rFoot.position.set(0, -0.54, 0.1);
  rLegG.add(rFoot);

  root.scale.setScalar(1.2);
  scene.add(root);

  return { root, headG, lArmG, rArmG, lLegG, rLegG };
}

// ============================================================
//  補間ヘルパー
// ============================================================
function lerp(a, b, t) { return a + (b - a) * t; }

// 角度の差を -PI〜PI に正規化
function angleDiff(from, to) {
  let d = to - from;
  while (d >  Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

// ============================================================
//  徘徊システム（XZ 移動）
// ============================================================
const wander = {
  tx: 0.8, tz: 0.4,           // 目的地
  phase: 'walk',               // 'walk' | 'pause'
  pauseTimer: 0,
  pauseDuration: 120,
};
let walkCycle = 0;

function pickTarget() {
  wander.tx = (Math.random() - 0.5) * 5.0;   // X: -2.5 〜 +2.5
  wander.tz = (Math.random() - 0.5) * 4.0;   // Z: -2.0 〜 +2.0
  wander.phase = 'walk';
  wander.pauseTimer = 0;
}

// ============================================================
//  停止中のアイドル行動
// ============================================================
const BEHAVIORS = ['bob', 'lookLeft', 'lookRight', 'waveLeft', 'waveRight', 'hop', 'nod'];
let idleBehavior  = 'bob';
let behaviorFrame = 0;
let behaviorTotal = 90;

function nextBehavior() {
  let next;
  do { next = BEHAVIORS[Math.floor(Math.random() * BEHAVIORS.length)]; }
  while (next === idleBehavior);
  idleBehavior  = next;
  behaviorFrame = 0;
  behaviorTotal = 70 + Math.random() * 100;
}

function doPausedBehavior(P, t) {
  behaviorFrame++;
  if (behaviorFrame > behaviorTotal) nextBehavior();

  const phase = behaviorFrame / behaviorTotal;
  const bob   = Math.sin(t * 1.5) * 0.035;

  // 停止中は正面（カメラ方向）をゆっくり向く
  P.root.rotation.y += angleDiff(P.root.rotation.y, 0) * 0.04;
  P.root.rotation.z  = lerp(P.root.rotation.z, 0, 0.07);
  P.root.position.y  = 0.18 + bob;

  switch (idleBehavior) {
    case 'bob':
      P.headG.rotation.z = Math.sin(t * 1.1) * 0.05;
      P.headG.rotation.y = lerp(P.headG.rotation.y, 0,    0.06);
      P.headG.rotation.x = lerp(P.headG.rotation.x, 0,    0.06);
      P.lArmG.rotation.z = lerp(P.lArmG.rotation.z,  0.25, 0.06);
      P.rArmG.rotation.z = lerp(P.rArmG.rotation.z, -0.25, 0.06);
      P.lArmG.rotation.x = lerp(P.lArmG.rotation.x, 0,    0.06);
      P.rArmG.rotation.x = lerp(P.rArmG.rotation.x, 0,    0.06);
      P.lLegG.rotation.x = lerp(P.lLegG.rotation.x, 0,    0.08);
      P.rLegG.rotation.x = lerp(P.rLegG.rotation.x, 0,    0.08);
      break;

    case 'lookLeft':
      P.headG.rotation.y = lerp(P.headG.rotation.y, -0.7,  0.05);
      P.headG.rotation.z = lerp(P.headG.rotation.z,  0.1,  0.05);
      P.headG.rotation.x = lerp(P.headG.rotation.x,  0,    0.05);
      P.lArmG.rotation.z = lerp(P.lArmG.rotation.z,  0.25, 0.05);
      P.rArmG.rotation.z = lerp(P.rArmG.rotation.z, -0.25, 0.05);
      P.lArmG.rotation.x = lerp(P.lArmG.rotation.x,  0,    0.05);
      P.rArmG.rotation.x = lerp(P.rArmG.rotation.x,  0,    0.05);
      P.lLegG.rotation.x = lerp(P.lLegG.rotation.x,  0,    0.06);
      P.rLegG.rotation.x = lerp(P.rLegG.rotation.x,  0,    0.06);
      break;

    case 'lookRight':
      P.headG.rotation.y = lerp(P.headG.rotation.y,  0.7,  0.05);
      P.headG.rotation.z = lerp(P.headG.rotation.z, -0.1,  0.05);
      P.headG.rotation.x = lerp(P.headG.rotation.x,  0,    0.05);
      P.lArmG.rotation.z = lerp(P.lArmG.rotation.z,  0.25, 0.05);
      P.rArmG.rotation.z = lerp(P.rArmG.rotation.z, -0.25, 0.05);
      P.lArmG.rotation.x = lerp(P.lArmG.rotation.x,  0,    0.05);
      P.rArmG.rotation.x = lerp(P.rArmG.rotation.x,  0,    0.05);
      P.lLegG.rotation.x = lerp(P.lLegG.rotation.x,  0,    0.06);
      P.rLegG.rotation.x = lerp(P.rLegG.rotation.x,  0,    0.06);
      break;

    case 'waveLeft':
      P.headG.rotation.z = Math.sin(t * 3) * 0.07;
      P.headG.rotation.y = lerp(P.headG.rotation.y, 0, 0.06);
      P.headG.rotation.x = lerp(P.headG.rotation.x, 0, 0.06);
      P.lArmG.rotation.z = -1.1 + Math.sin(t * 7) * 0.38;
      P.lArmG.rotation.x = Math.sin(t * 7 + 0.5) * 0.2;
      P.rArmG.rotation.z = lerp(P.rArmG.rotation.z, -0.25, 0.06);
      P.rArmG.rotation.x = lerp(P.rArmG.rotation.x,  0,    0.06);
      P.lLegG.rotation.x = lerp(P.lLegG.rotation.x, 0, 0.06);
      P.rLegG.rotation.x = lerp(P.rLegG.rotation.x, 0, 0.06);
      break;

    case 'waveRight':
      P.headG.rotation.z = Math.sin(t * 3) * 0.07;
      P.headG.rotation.y = lerp(P.headG.rotation.y, 0, 0.06);
      P.headG.rotation.x = lerp(P.headG.rotation.x, 0, 0.06);
      P.lArmG.rotation.z = lerp(P.lArmG.rotation.z,  0.25, 0.06);
      P.lArmG.rotation.x = lerp(P.lArmG.rotation.x,  0,    0.06);
      P.rArmG.rotation.z = 1.1 + Math.sin(t * 7) * 0.38;
      P.rArmG.rotation.x = Math.sin(t * 7 + 0.5) * 0.2;
      P.lLegG.rotation.x = lerp(P.lLegG.rotation.x, 0, 0.06);
      P.rLegG.rotation.x = lerp(P.rLegG.rotation.x, 0, 0.06);
      break;

    case 'hop': {
      const hopH = Math.max(0, Math.sin(phase * Math.PI * 2)) * 0.3;
      P.root.position.y  = 0.18 + hopH;
      P.root.rotation.z  = Math.sin(phase * Math.PI * 2) * 0.08;
      P.headG.rotation.z = Math.sin(t * 4) * 0.1;
      P.headG.rotation.y = lerp(P.headG.rotation.y, 0, 0.08);
      P.headG.rotation.x = lerp(P.headG.rotation.x, 0, 0.08);
      P.lArmG.rotation.z =  0.25 - hopH * 1.8;
      P.rArmG.rotation.z = -0.25 + hopH * 1.8;
      P.lArmG.rotation.x = lerp(P.lArmG.rotation.x, 0, 0.08);
      P.rArmG.rotation.x = lerp(P.rArmG.rotation.x, 0, 0.08);
      P.lLegG.rotation.x = -hopH * 0.7;
      P.rLegG.rotation.x = -hopH * 0.7;
      break;
    }

    case 'nod':
      P.headG.rotation.x = Math.sin(t * 5) * 0.28;
      P.headG.rotation.y = lerp(P.headG.rotation.y, 0, 0.08);
      P.headG.rotation.z = lerp(P.headG.rotation.z, 0, 0.08);
      P.lArmG.rotation.z = lerp(P.lArmG.rotation.z,  0.25, 0.06);
      P.rArmG.rotation.z = lerp(P.rArmG.rotation.z, -0.25, 0.06);
      P.lArmG.rotation.x = lerp(P.lArmG.rotation.x, 0, 0.06);
      P.rArmG.rotation.x = lerp(P.rArmG.rotation.x, 0, 0.06);
      P.lLegG.rotation.x = lerp(P.lLegG.rotation.x, 0, 0.06);
      P.rLegG.rotation.x = lerp(P.rLegG.rotation.x, 0, 0.06);
      break;
  }
}

// ============================================================
//  アイドル全体（歩き＋停止行動を管理）
// ============================================================
function animateIdle(P, t) {
  const dx   = wander.tx - P.root.position.x;
  const dz   = wander.tz - P.root.position.z;
  const dist = Math.sqrt(dx * dx + dz * dz);

  if (wander.phase === 'walk' && dist > 0.07) {
    // ── 歩行フェーズ ──────────────────────────────────
    const speed = 0.02;
    P.root.position.x += (dx / dist) * speed;
    P.root.position.z += (dz / dist) * speed;

    // 進行方向を向く（スムーズ回転）
    const targetAngle = Math.atan2(dx, dz);
    P.root.rotation.y += angleDiff(P.root.rotation.y, targetAngle) * 0.1;

    // 歩行アニメーション
    walkCycle += 0.13;
    P.root.position.y = 0.18 + Math.abs(Math.sin(walkCycle * 2)) * 0.07; // 上下バウンド
    P.root.rotation.z = Math.sin(walkCycle * 2) * 0.055;                 // 左右揺れ

    // 足を交互に前後
    P.lLegG.rotation.x =  Math.sin(walkCycle) * 0.48;
    P.rLegG.rotation.x = -Math.sin(walkCycle) * 0.48;
    // 腕は足と逆位相でスイング
    P.lArmG.rotation.x = -Math.sin(walkCycle) * 0.32;
    P.rArmG.rotation.x =  Math.sin(walkCycle) * 0.32;
    P.lArmG.rotation.z = lerp(P.lArmG.rotation.z,  0.25, 0.07);
    P.rArmG.rotation.z = lerp(P.rArmG.rotation.z, -0.25, 0.07);
    // 頭は安定させつつ少しだけ揺らす
    P.headG.rotation.z = Math.sin(walkCycle) * 0.05;
    P.headG.rotation.x = lerp(P.headG.rotation.x, 0, 0.05);
    P.headG.rotation.y = lerp(P.headG.rotation.y, 0, 0.05);

  } else if (wander.phase === 'walk') {
    // ── 目的地到着 → 停止フェーズへ ──────────────────
    wander.phase        = 'pause';
    wander.pauseTimer   = 0;
    wander.pauseDuration = 100 + Math.floor(Math.random() * 120);
    nextBehavior();

  } else {
    // ── 停止フェーズ ─────────────────────────────────
    wander.pauseTimer++;
    if (wander.pauseTimer >= wander.pauseDuration) pickTarget();
    doPausedBehavior(P, t);
  }
}

function animateDance(P, t) {
  // カメラに向かって寄ってくる（Z+）
  P.root.position.x = lerp(P.root.position.x, 0,   0.04);
  P.root.position.z = lerp(P.root.position.z, 2.2, 0.04);
  // 高くジャンプ
  P.root.position.y = 0.18 + Math.abs(Math.sin(t * 5.5)) * 0.38;
  // 体がスウィング（正面を向いたまま）
  P.root.rotation.z = Math.sin(t * 5) * 0.22;
  P.root.rotation.y += angleDiff(P.root.rotation.y, Math.sin(t * 2.5) * 0.2) * 0.15;
  // 頭ブンブン
  P.headG.rotation.z = Math.sin(t * 8)  * 0.32;
  P.headG.rotation.x = Math.sin(t * 6)  * 0.18;
  P.headG.rotation.y = Math.sin(t * 4)  * 0.15;
  // 腕を交互にポンプ
  P.lArmG.rotation.z = -0.4 + Math.sin(t * 5.5 + Math.PI) * 0.95;
  P.rArmG.rotation.z =  0.4 + Math.sin(t * 5.5)           * 0.95;
  P.lArmG.rotation.x =  Math.sin(t * 5.5) * 0.35;
  P.rArmG.rotation.x = -Math.sin(t * 5.5) * 0.35;
  // 足をキック
  P.lLegG.rotation.x = Math.sin(t * 5.5 + Math.PI) * 0.44;
  P.rLegG.rotation.x = Math.sin(t * 5.5)            * 0.44;
}

function animateSad(P, t) {
  // カメラから遠ざかる（Z−）＋中央に寄せる
  P.root.position.z = lerp(P.root.position.z, -4.5, 0.03);
  P.root.position.x = lerp(P.root.position.x,  0,   0.03);
  P.root.position.y = lerp(P.root.position.y,  0.1, 0.04);
  // 後ろを向きながら遠ざかる
  P.root.rotation.y += angleDiff(P.root.rotation.y, Math.PI) * 0.05;
  P.root.rotation.z  = lerp(P.root.rotation.z, 0, 0.06);
  // 頭がうなだれる
  P.headG.rotation.x = lerp(P.headG.rotation.x,  0.28, 0.06);
  P.headG.rotation.z = lerp(P.headG.rotation.z, -0.22, 0.06);
  P.headG.rotation.y = lerp(P.headG.rotation.y,  0,    0.06);
  // 腕がだらんと垂れる
  P.lArmG.rotation.z = lerp(P.lArmG.rotation.z,  0.45, 0.06);
  P.rArmG.rotation.z = lerp(P.rArmG.rotation.z, -0.45, 0.06);
  P.lArmG.rotation.x = lerp(P.lArmG.rotation.x,  0.3,  0.06);
  P.rArmG.rotation.x = lerp(P.rArmG.rotation.x,  0.3,  0.06);
  // しょんぼりとした小さな歩き
  P.lLegG.rotation.x = Math.sin(t * 1.5) * 0.12;
  P.rLegG.rotation.x = -Math.sin(t * 1.5) * 0.12;
}

// 戻り完了したら true を返す
function animateComeback(P) {
  // Z・X を中央・手前に引き戻す
  P.root.position.z  = lerp(P.root.position.z,  0,    0.05);
  P.root.position.x  = lerp(P.root.position.x,  0,    0.05);
  P.root.position.y  = lerp(P.root.position.y,  0.18, 0.07);
  P.root.rotation.y += angleDiff(P.root.rotation.y, 0) * 0.09;
  P.root.rotation.z  = lerp(P.root.rotation.z,  0, 0.09);
  P.headG.rotation.x = lerp(P.headG.rotation.x, 0, 0.09);
  P.headG.rotation.z = lerp(P.headG.rotation.z, 0, 0.09);
  P.lArmG.rotation.z = lerp(P.lArmG.rotation.z,  0.25, 0.09);
  P.rArmG.rotation.z = lerp(P.rArmG.rotation.z, -0.25, 0.09);
  P.lArmG.rotation.x = lerp(P.lArmG.rotation.x, 0, 0.09);
  P.rArmG.rotation.x = lerp(P.rArmG.rotation.x, 0, 0.09);
  P.lLegG.rotation.x = lerp(P.lLegG.rotation.x, 0, 0.09);
  P.rLegG.rotation.x = lerp(P.rLegG.rotation.x, 0, 0.09);
  return Math.abs(P.root.rotation.y) < 0.05 && Math.abs(P.root.position.z) < 0.2;
}

function animateSuccess(P, t) {
  P.root.position.y  = 0.18 + Math.abs(Math.sin(t * 4.5)) * 0.45;
  P.root.rotation.z  = Math.sin(t * 4) * 0.18;
  P.root.rotation.y  = Math.sin(t * 1.2) * 0.3;
  P.headG.rotation.z = Math.sin(t * 6)  * 0.28;
  P.headG.rotation.x = Math.sin(t * 5)  * 0.12;
  P.headG.rotation.y = Math.sin(t * 3)  * 0.1;
  // 両腕バンザイ
  P.lArmG.rotation.z = -1.35 + Math.sin(t * 6 + Math.PI) * 0.3;
  P.rArmG.rotation.z =  1.35 + Math.sin(t * 6)           * 0.3;
  P.lArmG.rotation.x = Math.sin(t * 7)  * 0.2;
  P.rArmG.rotation.x = -Math.sin(t * 7) * 0.2;
  P.lLegG.rotation.x = Math.sin(t * 4.5 + Math.PI) * 0.48;
  P.rLegG.rotation.x = Math.sin(t * 4.5)            * 0.48;
}

// ============================================================
//  メインパンダ
// ============================================================
const SZ = 260;
const mainCanvas = document.getElementById('panda-canvas');

const { renderer: mainRen, scene: mainScene, camera: mainCam } = createScene(mainCanvas, SZ);
const mainP = buildPanda(mainScene);
mainP.root.position.set(0, 0.18, 0);

let state = 'idle';
let t     = 0;

window.setPandaState = function(s) {
  state = s;
};

(function loop() {
  requestAnimationFrame(loop);
  t += 0.035;

  if      (state === 'idle')     animateIdle(mainP, t);
  else if (state === 'dance')    animateDance(mainP, t);
  else if (state === 'sad')      animateSad(mainP, t);
  else if (state === 'comeback') {
    if (animateComeback(mainP)) state = 'idle';
  }

  mainRen.render(mainScene, mainCam);
})();

// ============================================================
//  成功画面パンダ
// ============================================================
let successReady = false;

function initSuccessPanda() {
  if (successReady) return;
  successReady = true;

  const sc = document.getElementById('success-canvas');
  const { renderer: sRen, scene: sScene, camera: sCam } = createScene(sc, SZ);
  const sP = buildPanda(sScene);
  sP.root.position.set(0, 0.18, 0);

  let st = 0;
  (function sLoop() {
    requestAnimationFrame(sLoop);
    st += 0.04;
    animateSuccess(sP, st);
    sRen.render(sScene, sCam);
  })();
}

// ============================================================
//  UI ロジック
// ============================================================
const hearts  = document.getElementById('hearts');
const message = document.getElementById('message');
let denyCount = 0;

document.getElementById('btnAllow').addEventListener('mouseenter', spawnHearts);

function spawnHearts() {
  hearts.innerHTML = '';
  const emojis = ['❤️','🧡','💛','💚','💙','💜'];
  for (let i = 0; i < 7; i++) {
    setTimeout(() => {
      const h = document.createElement('span');
      h.className   = 'heart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left  = (Math.random() * 120 - 60) + 'px';
      h.style.animationDelay = (Math.random() * 0.3) + 's';
      hearts.appendChild(h);
      setTimeout(() => h.remove(), 1400);
    }, i * 80);
  }
}

document.getElementById('btnDeny').addEventListener('mouseleave', () =>
  message.classList.remove('show')
);

function onAllow() {
  setPandaState('idle');
  initSuccessPanda();
  document.getElementById('mainContent').classList.add('hide');
  document.getElementById('successScreen').classList.add('show');
  history.pushState({ page: 'success' }, '');
}

window.addEventListener('popstate', function () {
  document.getElementById('mainContent').classList.remove('hide');
  document.getElementById('successScreen').classList.remove('show');
  setPandaState('idle');
});

function onDeny() {
  denyCount++;
  const msgs = [
    'パンダはしょんぼりしています…🥺',
    'また気が向いたらお願いします…🐾',
    'わかりました。でも、さびしいです。',
  ];
  message.textContent = msgs[Math.min(denyCount - 1, msgs.length - 1)];
  message.classList.add('show');
}

window.onAllow = onAllow;
window.onDeny  = onDeny;
</script>
